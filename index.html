<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Servo Motor</title>
    <link rel="icon" href="favicon.ico" type="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text-primary: #f0f0f0;
            --text-muted: rgba(255,255,255,0.35);
            --accent: #ffffff;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated abstract background */
        canvas#bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.6;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            pointer-events: none;
            opacity: 0.4;
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
        }

        .label {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .value-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #valor {
            font-family: 'Space Mono', monospace;
            font-size: clamp(80px, 18vw, 200px);
            font-weight: 700;
            line-height: 1;
            color: var(--text-primary);
            letter-spacing: -0.04em;
            text-shadow:
                0 0 60px rgba(255,255,255,0.08),
                0 0 120px rgba(255,255,255,0.04);
            transition: color 0.3s ease;
        }

        #valor.active {
            color: #ffffff;
            text-shadow:
                0 0 40px rgba(255,255,255,0.25),
                0 0 80px rgba(255,255,255,0.1);
        }

        .status-line {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--text-muted);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .status-dot.connected {
            background: #fff;
            box-shadow: 0 0 8px rgba(255,255,255,0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        button {
            position: relative;
            background: transparent;
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 16px 40px;
            border: 1px solid var(--border);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.25s ease;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.25s ease;
        }

        button:hover {
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-1px);
        }

        button:hover::before {
            background: rgba(255,255,255,0.04);
        }

        button:active {
            transform: translateY(0px);
        }

        button.connected {
            border-color: rgba(255,255,255,0.2);
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <canvas id="bg"></canvas>

    <div class="container">
        <span class="label">Servo Motor</span>

        <div class="value-wrapper">
            <div id="valor">---</div>
        </div>

        <div class="status-line">
            <div class="status-dot" id="dot"></div>
            <span id="statusText">desconectado</span>
        </div>

        <button id="btn" onclick="conectar()">Conectar</button>
    </div>

    <script>
        // ── Animated Background ──────────────────────────────────────────────
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');

        let W, H, t = 0;
        const waves = [
            { speed: 0.0000003, amp: 0.22, freq: 1.4, yBase: 0.30, shades: ['#1a1a1a', '#0a0a0a'] },
            { speed: 0.0000003, amp: 0.18, freq: 1.1, yBase: 0.52, shades: ['#141414', '#0d0d0d'] },
            { speed: 0.0000003, amp: 0.15, freq: 1.7, yBase: 0.68, shades: ['#222222', '#111111'] },
            { speed: 0.0000003, amp: 0.20, freq: 0.9, yBase: 0.80, shades: ['#1c1c1c', '#0f0f0f'] },
        ];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function drawWave(wave, time) {
            ctx.beginPath();
            ctx.moveTo(0, H);

            for (let x = 0; x <= W; x += 4) {
                const nx = x / W;
                const y = (wave.yBase + Math.sin(nx * Math.PI * wave.freq * 2 + time * wave.speed * 10000) * wave.amp) * H;
                ctx.lineTo(x, y);
            }

            ctx.lineTo(W, H);
            ctx.closePath();

            const grad = ctx.createLinearGradient(0, 0, W, H);
            grad.addColorStop(0, wave.shades[0]);
            grad.addColorStop(1, wave.shades[1]);
            ctx.fillStyle = grad;
            ctx.fill();
        }

        function animate(ts) {
            t = ts;
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, W, H);

            waves.forEach(w => drawWave(w, ts));
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        requestAnimationFrame(animate);

        // ── Serial ───────────────────────────────────────────────────────────
        const btn = document.getElementById('btn');
        const dot = document.getElementById('dot');
        const statusText = document.getElementById('statusText');
        const valorEl = document.getElementById('valor');

        async function conectar() {
            try {
                const porta = await navigator.serial.requestPort();
                await porta.open({ baudRate: 9600 });

                dot.classList.add('connected');
                statusText.textContent = 'conectado';
                btn.textContent = 'Conectado';
                btn.classList.add('connected');
                btn.disabled = true;

                const leitor = porta.readable.getReader();
                let texto = "";

                while (true) {
                    const { value } = await leitor.read();
                    texto += new TextDecoder().decode(value);
                    const linhas = texto.split("\n");
                    texto = linhas.pop();
                    linhas.forEach(l => {
                        valorEl.textContent = l.trim() + "°";
                        valorEl.classList.add('active');
                    });
                }
            } catch (err) {
                dot.classList.remove('connected');
                statusText.textContent = 'erro ao conectar';
                btn.textContent = 'Tentar Novamente';
                btn.classList.remove('connected');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
